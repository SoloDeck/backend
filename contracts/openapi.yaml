# ===========================================================================
# COMPONENTS
# ===========================================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable Parameters
  # -------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    ShareToken:
      name: share_token
      in: path
      required: true
      schema:
        type: string
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DealId:
      name: deal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalId:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AiJobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContractId:
      name: contract_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoice_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentIntentId:
      name: payment_intent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReminderId:
      name: reminder_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChecklistItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # -------------------------------------------------------------------------
  # Reusable Responses — all use the standard ApiError envelope
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Validation error (VALIDATION_FAILED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid authentication token (UNAUTHORIZED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authenticated but not authorized for this action (FORBIDDEN)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found (NOT_FOUND)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflict — duplicate resource or invalid state transition (CONFLICT)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    PaymentRequired:
      description: Subscription does not include this feature (SUBSCRIPTION_REQUIRED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Unexpected server error (INTERNAL_SERVER_ERROR)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:

    # --- Enums ---
    UserRole:
      type: string
      enum: [freelancer, admin]

    UserStatus:
      type: string
      enum: [active, suspended, deleted]

    NotificationChannel:
      type: string
      enum: [email, in_app, both, zalo]

    ThemePreference:
      type: string
      enum: [light, dark]

    SubscriptionStatus:
      type: string
      enum: [active, past_due, suspended, cancelled]

    ClientType:
      type: string
      enum: [individual, company]

    ClientStatus:
      type: string
      enum: [prospect, active, inactive, archived]

    CommChannel:
      type: string
      enum: [email, phone, meeting, message]

    DealStage:
      type: string
      enum: [new_lead, qualified, proposal_sent, in_negotiation, active, completed_and_billed, lost]

    DealSource:
      type: string
      enum: [inbound, referral, outreach, platform, other]

    ProjectStatus:
      type: string
      description: >-
        Lifecycle of a Project. Projects can be created directly or auto-created
        in `planning` when a Deal transitions to `active`.
      enum: [planning, active, on_hold, completed]

    DealActivityType:
      type: string
      enum: [stage_change, note_added, document_attached, ai_qualification]

    ProposalStatus:
      type: string
      enum: [draft, sent, accepted, rejected, expired, superseded]

    ContractStatus:
      type: string
      enum: [draft, pending_signatures, active, completed, terminated, expired]

    InvoiceStatus:
      type: string
      enum: [draft, sent, partially_paid, paid, overdue, void]

    PaymentMethod:
      type: string
      enum: [bank_transfer, cash, online, other]

    PaymentProvider:
      type: string
      enum: [momo, bank_transfer, vnpay, manual]

    PaymentIntentStatus:
      type: string
      enum: [pending, processing, succeeded, failed, expired, cancelled]

    PaymentLinkType:
      type: string
      enum: [checkout_url, deep_link, qr_code, bank_transfer_instruction]

    ReminderTargetType:
      type: string
      enum: [deal, client, invoice, contract]

    ReminderType:
      type: string
      enum: [follow_up, proposal_follow_up, contract_signing_nudge, payment_due, payment_overdue, re_engagement, custom]

    ReminderStatus:
      type: string
      enum: [pending, sent, failed, cancelled, skipped]

    TemplateType:
      type: string
      enum: [proposal, contract]

    AIModuleType:
      type: string
      enum: [lead_qualifier, proposal_generator, contract_generator, followup_generator]

    PeriodType:
      type: string
      enum: [monthly, quarterly, yearly]

    # ---------------------------------------------------------------------------
    # Standard Response Envelope
    # ---------------------------------------------------------------------------

    # Single-resource success response
    # Usage: ApiResponse with data being any domain schema (e.g. ApiResponse_DealResponse)
    ApiResponseBase:
      type: object
      required: [success, code, timestamp, data]
      properties:
        success:
          type: boolean
          examples: true
        code:
          type: integer
          examples: 200
        timestamp:
          type: string
          format: date-time
          examples: "2026-06-01T12:00:00Z"
        data:
          description: Response payload (any object or array)

    # Collection success response
    PaginatedResponse:
      type: object
      required: [success, code, timestamp, data, pagination]
      properties:
        success:
          type: boolean
          examples: true
        code:
          type: integer
          examples: 200
        timestamp:
          type: string
          format: date-time
        data:
          type: array
          items: {}
          description: Array of resource objects
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    # Error envelope — wraps all 4xx and 5xx responses
    ApiError:
      type: object
      required: [success, code, timestamp, error]
      properties:
        success:
          type: boolean
          examples: false
        code:
          type: integer
          examples: 400
        timestamp:
          type: string
          format: date-time
        error:
          $ref: '#/components/schemas/ApiErrorDetail'

    ApiErrorDetail:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
          description: Human-readable explanation
          examples: Deal not found
        code:
          type: string
          description: Machine-readable error code
          enum:
            - VALIDATION_FAILED
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - BUSINESS_RULE_VIOLATION
            - SUBSCRIPTION_REQUIRED
            - AI_QUOTA_EXCEEDED
            - INTERNAL_SERVER_ERROR
          examples: NOT_FOUND
        details:
          type: array
          description: Field-level validation errors (populated for VALIDATION_FAILED only)
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

    ValidationErrorDetail:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: Dot-path to the invalid field
          examples: estimated_value
        message:
          type: string
          description: Why the value is invalid
          examples: Must be a positive number
        value:
          description: The submitted value that failed validation

    PaginationMetadata:
      type: object
      required: [total, page, page_size, total_pages]
      properties:
        total:
          type: integer
          description: Total number of matching records
          examples: 42
        page:
          type: integer
          description: Current page (1-indexed)
          examples: 1
        page_size:
          type: integer
          description: Records per page
          examples: 20
        total_pages:
          type: integer
          description: Total number of pages
          examples: 3

    # ---------------------------------------------------------------------------
    # Legacy aliases — kept for backward-compat during migration; will be removed
    # ---------------------------------------------------------------------------
    ErrorResponse:
      $ref: '#/components/schemas/ApiError'
    ValidationErrorResponse:
      $ref: '#/components/schemas/ApiError'
    EntitlementErrorResponse:
      $ref: '#/components/schemas/ApiError'
    PaginationMeta:
      $ref: '#/components/schemas/PaginationMetadata'

    # --- Auth ---
    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          examples: jane@examples.com
        password:
          type: string
          format: password
          minLength: 8
          examples: s3cretPass!
        full_name:
          type: string
          minLength: 1
          examples: Nguyễn Văn A

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@solodesk.dev
        password:
          type: string
          format: password
          minLength: 8
          example: Admin@SoloDesk2025!
      example:
        email: admin@solodesk.dev
        password: Admin@SoloDesk2025!

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    GoogleAuthRequest:
      type: object
      required: [id_token, platform]
      properties:
        id_token:
          type: string
