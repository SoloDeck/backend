    ContractGenerationResponse:
      type: object
      required: [contract_id, content, generation_id]
      properties:
        contract_id:
          type: string
          format: uuid
        content:
          $ref: '#/components/schemas/ContractContentDTO'
        generation_id:
          type: string
          format: uuid

    FollowUpGenerationRequest:
