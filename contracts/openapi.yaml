        '200':
          description: Platform metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformMetricsResponse'

# ===========================================================================
# COMPONENTS
# ===========================================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable Parameters
  # -------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    ShareToken:
      name: share_token
      in: path
      required: true
      schema:
        type: string
    ClientId:
      name: client_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DealId:
      name: deal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProposalId:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContractId:
      name: contract_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceId:
      name: invoice_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PaymentIntentId:
      name: payment_intent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReminderId:
      name: reminder_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PlanId:
      name: plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # -------------------------------------------------------------------------
  # Reusable Responses — all use the standard ApiError envelope
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Validation error (VALIDATION_FAILED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid authentication token (UNAUTHORIZED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authenticated but not authorized for this action (FORBIDDEN)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found (NOT_FOUND)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflict — duplicate resource or invalid state transition (CONFLICT)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    PaymentRequired:
      description: Subscription does not include this feature (SUBSCRIPTION_REQUIRED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Unexpected server error (INTERNAL_SERVER_ERROR)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:

    # --- Enums ---
    UserRole:
      type: string
      enum: [freelancer, admin]

    UserStatus:
      type: string
      enum: [active, suspended, deleted]

    NotificationChannel:
      type: string
      enum: [email, in_app, both]

    ThemePreference:
      type: string
      enum: [light, dark]

    SubscriptionStatus:
      type: string
      enum: [active, past_due, suspended, cancelled]

    ClientType:
      type: string
      enum: [individual, company]

    ClientStatus:
      type: string
      enum: [prospect, active, inactive, archived]

    CommChannel:
      type: string
      enum: [email, phone, meeting, message]

    DealStage:
      type: string
      enum: [new_lead, qualified, proposal_sent, in_negotiation, active, completed_and_billed, lost]

    DealSource:
      type: string
      enum: [inbound, referral, outreach, platform, other]

    DealActivityType:
      type: string
      enum: [stage_change, note_added, document_attached, ai_qualification]

    ProposalStatus:
      type: string
      enum: [draft, sent, accepted, rejected, expired, superseded]

    ContractStatus:
      type: string
      enum: [draft, pending_signatures, active, completed, terminated, expired]

    InvoiceStatus:
      type: string
      enum: [draft, sent, partially_paid, paid, overdue, void]

    PaymentMethod:
      type: string
      enum: [bank_transfer, cash, online, other]

    PaymentProvider:
      type: string
      enum: [momo, bank_transfer, vnpay, manual]

    PaymentIntentStatus:
      type: string
      enum: [pending, processing, succeeded, failed, expired, cancelled]

    PaymentLinkType:
      type: string
      enum: [checkout_url, deep_link, qr_code, bank_transfer_instruction]

    ReminderTargetType:
      type: string
      enum: [deal, client, invoice, contract]

    ReminderType:
      type: string
      enum: [follow_up, proposal_follow_up, contract_signing_nudge, payment_due, payment_overdue, re_engagement, custom]

    ReminderStatus:
      type: string
      enum: [pending, sent, failed, cancelled, skipped]

    TemplateType:
      type: string
      enum: [proposal, contract]

    AIModuleType:
      type: string
      enum: [lead_qualifier, proposal_generator, contract_generator, followup_generator]

    PeriodType:
      type: string
      enum: [monthly, quarterly, yearly]

    # ---------------------------------------------------------------------------
    # Standard Response Envelope
    # ---------------------------------------------------------------------------

    # Single-resource success response
    # Usage: ApiResponse with data being any domain schema (e.g. ApiResponse_DealResponse)
    ApiResponseBase:
      type: object
      required: [success, code, timestamp, data]
      properties:
        success:
          type: boolean
          example: true
        code:
          type: integer
          example: 200
        timestamp:
          type: string
          format: date-time
          example: "2026-06-01T12:00:00Z"
        data:
          description: Response payload (any object or array)

    # Collection success response
    PaginatedResponse:
      type: object
      required: [success, code, timestamp, data, pagination]
      properties:
        success:
          type: boolean
          example: true
        code:
          type: integer
          example: 200
        timestamp:
          type: string
          format: date-time
        data:
          type: array
          items: {}
          description: Array of resource objects
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    # Error envelope — wraps all 4xx and 5xx responses
    ApiError:
      type: object
      required: [success, code, timestamp, error]
      properties:
        success:
          type: boolean
          example: false
        code:
          type: integer
          example: 400
        timestamp:
          type: string
          format: date-time
        error:
          $ref: '#/components/schemas/ApiErrorDetail'

    ApiErrorDetail:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
          description: Human-readable explanation
          example: Deal not found
        code:
          type: string
          description: Machine-readable error code
          enum:
            - VALIDATION_FAILED
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - BUSINESS_RULE_VIOLATION
            - SUBSCRIPTION_REQUIRED
            - AI_QUOTA_EXCEEDED
            - INTERNAL_SERVER_ERROR
          example: NOT_FOUND
        details:
          type: array
          description: Field-level validation errors (populated for VALIDATION_FAILED only)
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

    ValidationErrorDetail:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: Dot-path to the invalid field
          example: estimated_value
        message:
          type: string
          description: Why the value is invalid
          example: Must be a positive number
        value:
          description: The submitted value that failed validation

    PaginationMetadata:
      type: object
      required: [total, page, page_size, total_pages]
      properties:
        total:
          type: integer
          description: Total number of matching records
          example: 42
        page:
          type: integer
          description: Current page (1-indexed)
          example: 1
        page_size:
          type: integer
          description: Records per page
          example: 20
        total_pages:
          type: integer
          description: Total number of pages
          example: 3

    # ---------------------------------------------------------------------------
    # Legacy aliases — kept for backward-compat during migration; will be removed
    # ---------------------------------------------------------------------------
    ErrorResponse:
      $ref: '#/components/schemas/ApiError'
    ValidationErrorResponse:
      $ref: '#/components/schemas/ApiError'
    EntitlementErrorResponse:
      $ref: '#/components/schemas/ApiError'
    PaginationMeta:
      $ref: '#/components/schemas/PaginationMetadata'

    # --- Auth ---
    RegisterRequest:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: s3cretPass!
        full_name:
          type: string
          minLength: 1
          example: Nguyễn Văn A

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthTokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token TTL in seconds
          example: 900
        user:
          $ref: '#/components/schemas/UserResponse'

    PasswordResetRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8

    # --- Users ---
    ProfessionalProfileDTO:
      type: object
      properties:
        skills:
          type: array
          items:
            type: string
        specialization:
          type: string
        default_hourly_rate:
          type: number
          format: decimal
        currency:
          type: string
          example: VND
        portfolio_url:
          type: string
          format: uri
        business_name:
          type: string

    PreferencesDTO:
      type: object
      properties:
        locale:
          type: string
          example: vi
        timezone:
          type: string
          example: Asia/Ho_Chi_Minh
        notification_channel:
          $ref: '#/components/schemas/NotificationChannel'
        theme:
          $ref: '#/components/schemas/ThemePreference'

    UserResponse:
      type: object
      required: [id, email, full_name, role, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        phone:
          type: string
        professional_profile:
          $ref: '#/components/schemas/ProfessionalProfileDTO'
        preferences:
          $ref: '#/components/schemas/PreferencesDTO'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        phone:
          type: string

    UpdateProfessionalProfileRequest:
      $ref: '#/components/schemas/ProfessionalProfileDTO'

    UpdatePreferencesRequest:
      $ref: '#/components/schemas/PreferencesDTO'

    # --- Subscriptions ---
    SubscriptionPlanResponse:
      type: object
      required: [id, name, slug, price_monthly, currency]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Pro
        slug:
          type: string
          example: pro
        price_monthly:
          type: number
          format: decimal
        currency:
          type: string
          example: USD
        max_ai_generations_per_month:
          type: integer
        can_use_ai:
          type: boolean
        can_export_pdf:
          type: boolean
        max_clients:
          type: integer
          nullable: true
        max_deals:
          type: integer
          nullable: true
        is_active:
          type: boolean

    SubscriptionResponse:
      type: object
      required: [id, user_id, plan, status, current_period_start, current_period_end]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        plan:
          $ref: '#/components/schemas/SubscriptionPlanResponse'
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        override_expires_at:
          type: string
          format: date-time
          nullable: true

    UsageRecordResponse:
      type: object
      required: [user_id, billing_period_start, billing_period_end, ai_generations_used]
      properties:
        user_id:
          type: string
          format: uuid
        billing_period_start:
          type: string
          format: date-time
        billing_period_end:
          type: string
          format: date-time
        ai_generations_used:
          type: integer
        ai_generations_limit:
          type: integer
          description: From the current plan

    ChangePlanRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
          format: uuid

    # --- Clients ---
    ContactInfoDTO:
      type: object
      properties:
        phone:
          type: string
        website:
          type: string
          format: uri
        linkedin_url:
          type: string
          format: uri
        address_city:
          type: string
        address_country:
          type: string

    ClientResponse:
      type: object
      required: [id, owner_user_id, type, name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ClientType'
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        status:
          $ref: '#/components/schemas/ClientStatus'
        notes:
          type: string
          nullable: true
        contact_info:
          $ref: '#/components/schemas/ContactInfoDTO'
        tags:
          type: array
