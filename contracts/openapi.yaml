openapi: 3.1.0
info:
  title: SoloDesk API
  description: AI-powered CRM and deal management platform for Vietnamese freelancers.
  version: 1.0.0
  contact:
    email: solodeskai@gmail.com

servers:
  - url: /api/v1
    description: Current version

security:
  - BearerAuth: []

tags:
  - name: Auth
  - name: Users
  - name: Subscriptions
  - name: Clients
  - name: Deals
  - name: Proposals
  - name: Contracts
  - name: Invoices
  - name: Payments
  - name: Reminders
  - name: Analytics
  - name: AI
  - name: Admin
  - name: Public

# ===========================================================================
# PATHS
# ===========================================================================
paths:

  # -------------------------------------------------------------------------
  # AUTH
  # -------------------------------------------------------------------------
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new freelancer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created — returns access and refresh tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and obtain new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    get:
      tags: [Auth]
      summary: Initiate Google OAuth 2.0 flow
      security: []
      responses:
        '302':
          description: Redirect to Google authorization endpoint

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Handle Google OAuth callback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '204':
          description: Reset email sent (always 204 regardless of whether email exists)
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Apply new password using reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '204':
          description: Password updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          description: Token expired or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # USERS
  # -------------------------------------------------------------------------
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update current user identity fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Users]
      summary: Request soft-deletion of own account
      responses:
        '204':
          description: Account scheduled for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/professional-profile:
    patch:
      tags: [Users]
      summary: Update professional profile (skills, rate, portfolio…)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfessionalProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/me/preferences:
    patch:
      tags: [Users]
      summary: Update notification, locale, and theme preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  # -------------------------------------------------------------------------
  # SUBSCRIPTIONS
  # -------------------------------------------------------------------------
  /subscriptions/plans:
    get:
      tags: [Subscriptions]
      summary: List all active subscription plans
      security: []
      responses:
        '200':
          description: Plan catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionPlanResponse'

  /subscriptions/plans/{plan_id}:
    get:
      tags: [Subscriptions]
      summary: Get a single plan
      security: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionPlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions/me:
    get:
      tags: [Subscriptions]
      summary: Get current user subscription
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/upgrade:
    post:
      tags: [Subscriptions]
      summary: Upgrade to a higher plan (takes effect immediately)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlanRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /subscriptions/me/downgrade:
    post:
      tags: [Subscriptions]
      summary: Downgrade to a lower plan (takes effect at period end)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlanRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel subscription at period end
      responses:
        '200':
          description: Subscription scheduled for cancellation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/usage:
    get:
      tags: [Subscriptions]
      summary: Get usage counters for current billing period
      responses:
        '200':
          description: Usage record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageRecordResponse'

  # -------------------------------------------------------------------------
  # CLIENTS
  # -------------------------------------------------------------------------
  /clients:
    get:
      tags: [Clients]
      summary: List clients
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ClientStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ClientType'
        - name: search
          in: query
          description: Full-text search on name and email
          schema:
            type: string
        - name: tag
          in: query
          description: Filter by tag (exact match, lowercase)
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [name, created_at, updated_at, status]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated client list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPage'

    post:
      tags: [Clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Created client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{client_id}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: Get client detail
      responses:
        '200':
          description: Client detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clients]
      summary: Update client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Updated client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Clients]
      summary: Soft-delete (archive) a client
      responses:
        '204':
          description: Client archived
        '409':
          description: Client has active deals, contracts or invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{client_id}/communication-logs:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List communication log entries for a client
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/CommChannel'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [communicated_at, created_at]
            default: communicated_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunicationLogPage'
    post:
      tags: [Clients]
      summary: Append a communication log entry (append-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommunicationLogRequest'
      responses:
        '201':
          description: Log entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunicationLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /clients/{client_id}/tags:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List tags on a client
      responses:
        '200':
          description: Tag list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientTagResponse'
    post:
      tags: [Clients]
      summary: Add a tag to a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagRequest'
      responses:
        '201':
          description: Tag added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTagResponse'
        '409':
          description: Tag already exists or client has 10 tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{client_id}/tags/{tag}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - name: tag
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [Clients]
      summary: Remove a tag from a client
      responses:
        '204':
          description: Tag removed
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # DEALS
  # -------------------------------------------------------------------------
  /deals:
    get:
      tags: [Deals]
      summary: List deals
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: stage
          in: query
          schema:
            $ref: '#/components/schemas/DealStage'
        - name: client_id
          in: query
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          schema:
            $ref: '#/components/schemas/DealSource'
        - name: from_date
          in: query
          description: Filter by created_at >=
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          description: Filter by created_at <=
          schema:
            type: string
            format: date-time
        - name: min_value
          in: query
          schema:
            type: number
        - name: max_value
          in: query
          schema:
            type: number
        - name: search
          in: query
          description: Full-text search on title and notes
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, updated_at, estimated_value, actual_value, closed_at]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated deal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealPage'

    post:
      tags: [Deals]
      summary: Create a deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Created deal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /deals/{deal_id}:
    parameters:
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [Deals]
      summary: Get deal detail
      responses:
        '200':
          description: Deal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Deals]
      summary: Update deal (blocked on terminal stages)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '409':
          description: Deal is in a terminal stage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Deals]
      summary: Soft-delete a deal
      responses:
        '204':
          description: Deal deleted

  /deals/{deal_id}/stage-transition:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Advance deal to next pipeline stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StageTransitionRequest'
      responses:
        '200':
          description: Deal with updated stage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '400':
          description: Invalid transition or missing prerequisites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /deals/{deal_id}/qualify:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Trigger AI lead qualification for a deal
      responses:
        '200':
          description: Qualification result applied to deal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadQualificationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'

  /deals/{deal_id}/activity:
    parameters:
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [Deals]
      summary: List activity timeline for a deal
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: entry_type
          in: query
          schema:
            $ref: '#/components/schemas/DealActivityType'
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated activity entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivityPage'

  /deals/{deal_id}/notes:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Append a note to a deal activity log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNoteRequest'
      responses:
        '201':
          description: Note added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivityEntryResponse'

  # -------------------------------------------------------------------------
  # PROPOSALS
  # -------------------------------------------------------------------------
  /proposals:
    get:
      tags: [Proposals]
      summary: List proposals
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: deal_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProposalStatus'
        - name: ai_generated
          in: query
          schema:
            type: boolean
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, sent_at, version_number]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated proposal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalPage'

    post:
      tags: [Proposals]
      summary: Create a proposal draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposalRequest'
      responses:
        '201':
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /proposals/{proposal_id}:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    get:
      tags: [Proposals]
      summary: Get proposal detail
      responses:
        '200':
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Proposals]
      summary: Update proposal (draft only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProposalRequest'
      responses:
        '200':
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'
        '409':
          description: Proposal is not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Proposals]
      summary: Delete a draft proposal
      responses:
        '204':
          description: Proposal deleted
        '409':
          description: Only draft proposals can be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/{proposal_id}/send:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    post:
      tags: [Proposals]
      summary: Send proposal to client (generates share link, locks content)
      responses:
        '200':
          description: Proposal sent with share_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'
        '400':
          description: Pricing total mismatch or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/{proposal_id}/generate:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    post:
      tags: [Proposals]
      summary: Trigger AI generation to fill/replace proposal content (returns draft)
      responses:
        '200':
          description: Proposal updated with AI-generated draft content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  # Public — no auth required
  /proposals/public/{share_token}:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    get:
      tags: [Public]
      summary: View a proposal via shareable link (client-facing, no auth)
      security: []
      responses:
        '200':
          description: Proposal read-only view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProposalResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Share link expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/public/{share_token}/respond:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    post:
      tags: [Public]
      summary: Client submits accept or reject response
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalRespondRequest'
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProposalResponse'
        '409':
          description: Proposal already responded or expired
          content:
            application/json:
              schema:
