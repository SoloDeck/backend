openapi: 3.1.0
info:
  title: SoloDesk API
  description: |
    **SoloDesk – Intelligent Client & Deal Management System**  
    AI-powered CRM and deal management platform for Vietnamese freelancers (designer, developer, marketer, photographer...). 
  version: 1.0.0
  contact:
    name: SoloDesk Capstone Team – GSU26SE083
    email: solodeskai@gmail.com
  x-contract-verification:
    verified_on: '2026-06-15'
    task: 'Phase 6 — reconcile openapi.yaml with live routers (6.1) + Package 2 implementation (6.2–6.6)'
    lint_status: 'PASS'
    fixes_applied:
      - 'Qualification endpoint is POST /deals/{deal_id}/qualify — triggers AI scoring directly by deal ID.'
      - 'Added POST /users/me/change-password (implemented in api but missing from spec).'
      - '6.5: /invoices/public/{share_token} implemented; InvoiceResponse exposes share_token.'
      - '6.6: POST /intake/{share_token} implemented (201/404/422/429); UserResponse exposes intake_share_token; added PublicIntakeRequest/PublicIntakeResponse.'
    intentional_gaps:
      - 'None outstanding for Phase 6 Package 2 endpoints.'
      - 'Phase 6 Package 3: GET /intake/{share_token}/config, GET /intake-form, PUT /intake-form added.'

servers:
  - url: https://api.solodesk.space/api/v1
    description: Production
  - url: https://api-staging.solodesk.space/api/v1
    description: Staging
  - url: http://localhost:8000/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Registration, credential login, Google OAuth, JWT lifecycle, and password reset.
  - name: Users
    description: User account CRUD, professional profile, and notification preferences.
  - name: Subscriptions
    description: Plan catalog, subscription lifecycle, plan changes, and AI usage counters.
  - name: Clients
    description: Client address book, contact info, communication logs, and description.
  - name: Deals
    description: Deal CRUD, pipeline stage transitions, activity timeline, and AI lead qualification.
  - name: Projects
    description: Project lifecycle linked to a Deal — a Deal moving to the `active` stage auto-creates a linked Project.
  - name: Tasks
    description: Polymorphic task tracking attached to a project, deal, or reminder (entity_type + entity_id), with checklist items.
  - name: Proposals
    description: Proposal versioning, lifecycle (draft → sent → accepted/rejected/expired), and AI generation.
  - name: Contracts
    description: Contract creation from accepted proposals, signing workflow, amendments, and milestones.
  - name: Invoices
    description: Invoice CRUD, line items, tax calculation, status transitions, and payment recording.
  - name: Payments
    description: Payment link generation, payment intent management, and provider webhook ingestion.
  - name: Reminders
    description: Reminder scheduling, recurrence rules, and delivery management via Celery workers.
  - name: Analytics
    description: Read-only derived metrics — revenue, pipeline, win rate, top clients, and AI usage.
  - name: AI
    description: Standalone AI endpoints for lead qualification, proposal/contract generation, and follow-up drafts. All require an AI-enabled subscription.
  - name: AI Jobs
    description: Background-tracked AI generation runs (lead qualification, proposal/contract generation) dispatched to a Celery worker and polled for status — use this instead of the synchronous `AI` endpoints when the caller cannot block on the request.
  - name: Admin
    description: Platform administration — user management, subscription overrides, plan catalog, templates, feature flags, AI cost monitoring, and audit logs. Requires `role=admin`.
  - name: Intake Form
    description: Authenticated endpoints for freelancers to configure their client-facing intake form — field definitions, labels, visibility, and required-field rules.
  - name: Public
    description: Client-facing unauthenticated endpoints for viewing and responding to proposals, contracts, and invoices via shareable links.

# ===========================================================================
# PATHS
# ===========================================================================
paths:


  /intake/{share_token}/config:
    get:
      tags: [Public]
      summary: Get public intake form configuration
      description: |
        Returns the freelancer's intake form configuration for public display.
        Only fields with `is_visible=true` are included. Used by the client-facing
        intake page to render the correct form before submission.
        No authentication required — the `share_token` identifies the freelancer.
      security: []
      parameters:
        - name: share_token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public form configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicIntakeFormConfigResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /intake/{share_token}:
    post:
      tags: [Public]
      summary: Submit public deal intake
      description: |
        Unauthenticated lead capture. The owner is resolved from the hard-to-guess
        `share_token` (each user has one, surfaced as `intake_share_token` on
        `GET /users/me`). Creates a minimal prospect client, a `new_lead` deal that
        appears in the owner's `GET /deals`, and a deal-intake record holding the raw
        inquiry. No AI scoring at this stage (Package 3). Basic per-link rate limiting
        applies (HTTP 429 when exceeded).
      security: []
      parameters:
        - name: share_token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicIntakeRequest'
      responses:
        '201':
          description: Intake submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicIntakeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Request body failed validation (VALIDATION_FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Too many submissions for this link (RATE_LIMITED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # -------------------------------------------------------------------------
  # PUBLIC FREELANCER DIRECTORY
  # -------------------------------------------------------------------------
  /public/freelancers/categories:
    get:
      tags: [Public]
      summary: List freelancer categories
      description: |
        Returns the 5 static skill categories used to browse and filter the
        freelancer directory. No authentication required.
      security: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FreelancerCategoryResponse'

  /public/freelancers:
    get:
      tags: [Public]
      summary: Search freelancers
      description: |
        Paginated public search across opted-in freelancers (`is_listed=true`).
        Supports free-text search (`q`) over name, professional title, and bio,
        and multi-value category filter (array overlap — a freelancer matching
        any of the supplied slugs is returned). Both filters are combinable.
        No authentication required.
      security: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search by name, title, or bio (case-insensitive, partial match)
        - name: categories
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              enum: [design, programming, marketing, content, consulting]
          style: form
          explode: true
          description: Filter by category slugs — multiple values are OR-combined
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated list of freelancers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FreelancerPublicResponse'

  /public/freelancers/{freelancer_id}:
    get:
      tags: [Public]
      summary: Get freelancer public profile
      description: |
        Returns the public profile of a single opted-in freelancer.
        Returns 404 if the freelancer does not exist or has `is_listed=false`.
        No authentication required.
      security: []
      parameters:
        - name: freelancer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Freelancer public profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FreelancerPublicResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # INTAKE FORM (authenticated)
  # -------------------------------------------------------------------------
  /intake-form:
    get:
      tags: [Intake Form]
      summary: Get intake form configuration
      description: |
        Returns the authenticated freelancer's intake form configuration including
        all fields (visible and hidden). Falls back to the 7-field default form if
        no configuration has been saved yet. The `share_url` in the response is the
        public link to share with potential clients.
      responses:
        '200':
          description: Intake form configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IntakeFormResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Intake Form]
      summary: Save intake form configuration
      description: |
        Creates or fully replaces the authenticated freelancer's intake form
        configuration. The `fields` array is a complete replacement — omitting a
        field removes it. Returns the saved configuration including all fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntakeFormUpdateRequest'
      responses:
        '200':
          description: Saved intake form configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IntakeFormResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # -------------------------------------------------------------------------
  # AUTH
  # -------------------------------------------------------------------------
  /auth/config:
    get:
      tags: [Auth]
      summary: Get public configuration settings
      description: |
        Returns public environment configuration and client IDs (like Google Web Client ID)
        required by the frontend client at startup. No authentication required.
      security: []
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClientConfigResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new freelancer account
      description: |
        Creates a new user account and provisions a free-tier subscription automatically.
        Password must be at least 8 characters. Returns a JWT access token and a refresh
        token so the caller can start authenticated requests immediately.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created — returns access and refresh tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Validates credentials and returns a short-lived access token (15 min) and a
        long-lived refresh token. Subject to rate limiting — repeated failures from the
        same IP return 429.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and obtain new access token
      description: |
        Token rotation strategy — the submitted refresh token is invalidated immediately
        and a new pair is issued. Each refresh token is single-use; replaying an old
        token returns 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session
      description: |
        Blacklists the caller's access token in Redis. Any subsequent request carrying
        the same token returns 401. The refresh token is also revoked server-side.
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    post:
      tags: [Auth]
      summary: Exchange a Google ID token for SoloDesk tokens
      description: |
        Token Exchange Flow. The client obtains a Google `id_token` directly from the
        native Google SDK (GIS on web, google_sign_in on mobile) and posts it here
        together with the originating `platform`. The backend verifies the token offline
        against Google's cached public certificates, selecting the expected audience from
        the platform's client ID, then issues SoloDesk access and refresh tokens. A new
        account is created automatically if the Google email is not yet registered; an
        existing email/password account is linked to the Google identity.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: |
        Always returns 204 regardless of whether the email is registered, to prevent
        email enumeration. The reset link is valid for 1 hour.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '204':
          description: Reset email sent (always 204 regardless of whether email exists)
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Apply new password using reset token
      description: |
        Token is single-use and expires after 1 hour. On success, all existing sessions
        for the account are revoked immediately.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '204':
          description: Password updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          description: Token expired or already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # USERS
  # -------------------------------------------------------------------------
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Returns the full profile including nested `professional_profile` and `preferences` objects.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update current user identity fields
      description: |
        Partial update — only provided fields are changed. Email cannot be changed via this
        endpoint (no re-verification flow exists yet); use an admin action if it must change.
        Changing `phone` triggers a uniqueness check across all users and returns 409 if the
        number is already taken.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Users]
      summary: Request soft-deletion of own account
      description: |
        Sets `deleted_at` on the user record (soft delete). All active sessions are
        revoked immediately. Data is retained for 30 days before permanent deletion.
      responses:
        '204':
          description: Account scheduled for deletion
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload a new profile picture
      description: |
        Accepts a single image file (`image/jpeg`, `image/png`, or `image/webp`, max 5MB)
        as multipart form data, stores it in object storage, and sets `avatar_url` to the
        resulting public URL.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated user with new avatar_url
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /users/me/professional-profile:
    patch:
      tags: [Users]
      summary: Update professional profile (skills, rate, portfolio…)
      description: |
        Updates skills, hourly rate, and portfolio metadata. These values are read by the
        AI proposal generator to personalize generated content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfessionalProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/me/preferences:
    patch:
      tags: [Users]
      summary: Update notification, locale, and theme preferences
      description: |
        `locale` and `timezone` affect reminder scheduling and the language used by AI
        content generation. Changes take effect on the next AI call or reminder dispatch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'

  /users/me/change-password:
    post:
      tags: [Users]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # -------------------------------------------------------------------------
  # SUBSCRIPTIONS
  # -------------------------------------------------------------------------
  /subscriptions/plans:
    get:
      tags: [Subscriptions]
      summary: List all active subscription plans
      description: Returns only plans with `is_active=true`. Use `/admin/plans` to list all plans including deactivated ones.
      security: []
      responses:
        '200':
          description: Plan catalog
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SubscriptionPlanResponse'

  /subscriptions/plans/{plan_id}:
    get:
      tags: [Subscriptions]
      summary: Get a single plan
      security: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionPlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions/me:
    get:
      tags: [Subscriptions]
      summary: Get current user subscription
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/upgrade:
    post:
      tags: [Subscriptions]
      summary: Upgrade to a higher plan (takes effect immediately)
      description: |
        The plan switch is immediate. AI generation quota resets to 0 at the start of
        the new billing period. Downgrading within the same request is rejected — use
        `/subscriptions/me/downgrade` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlanRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /subscriptions/me/downgrade:
    post:
      tags: [Subscriptions]
      summary: Downgrade to a lower plan (takes effect at period end)
      description: |
        Schedules the plan change for `current_period_end`. Current plan benefits,
        including AI quota, remain active until then. Sets `cancel_at_period_end=true`
        on the current plan internally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePlanRequest'
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/cancel:
    post:
      tags: [Subscriptions]
      summary: Cancel subscription at period end
      description: |
        Marks the subscription for cancellation at `current_period_end`. Access continues
        until then. After cancellation, the user is downgraded to the free tier — they do
        not lose existing data, but AI features become unavailable.
      responses:
        '200':
          description: Subscription scheduled for cancellation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionResponse'

  /subscriptions/me/usage:
    get:
      tags: [Subscriptions]
      summary: Get usage counters for current billing period
      description: |
        `ai_generations_used` resets at `billing_period_start`. Compare against
        the plan's `max_ai_generations_per_month` to determine remaining quota.
      responses:
        '200':
          description: Usage record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UsageRecordResponse'

  # -------------------------------------------------------------------------
  # CLIENTS
  # -------------------------------------------------------------------------
  /clients:
    get:
      tags: [Clients]
      summary: List clients
      description: |
        Returns only clients owned by the authenticated user (`owner_user_id` filter is
        applied automatically). Soft-deleted clients are always excluded.
      parameters:
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/ClientStatus'
        - name: name
          in: query
          description: Search by name (case-insensitive, partial match)
          schema:
            type: string
        - name: email
          in: query
          description: Search by email (case-insensitive, partial match)
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Number of items per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated client list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPage'

    post:
      tags: [Clients]
      summary: Create a client
      description: |
        Client `email` is unique **per owner**, not globally — two different freelancers
        may register the same client email. Returns 409 only when the same user already
        has a client with that address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Created client
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{client_id}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: Get client detail
      responses:
        '200':
          description: Client detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClientResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clients]
      summary: Update client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Updated client
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ClientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Clients]
      summary: Soft-delete (archive) a client
      description: |
        Sets `deleted_at` on the client record (soft delete). Blocked with 409 if the
        client has any active deals, pending contracts, or unpaid invoices.
      responses:
        '204':
          description: Client archived
        '409':
          description: Client has active deals, contracts or invoices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /clients/{client_id}/comm-logs:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List communication log entries for a client
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/CommChannel'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [communicated_at, created_at]
            default: communicated_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunicationLogPage'
    post:
      tags: [Clients]
      summary: Append a communication log entry (append-only)
      description: |
        Entries cannot be edited or deleted after creation — this is an immutable audit
        trail of client interactions. `communicated_at` can be backdated to record
        historical communications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommunicationLogRequest'
      responses:
        '201':
          description: Log entry created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CommunicationLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # -------------------------------------------------------------------------
  # DEALS
  # -------------------------------------------------------------------------
  /deals:
    get:
      tags: [Deals]
      summary: List deals
      description: |
        Returns only deals owned by the authenticated user. Soft-deleted deals are always
        excluded. Use `stage` filter to view a specific pipeline column.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: client_id
          in: query
          description: Filter deals belonging to a single client (Client Detail view)
          schema:
            type: string
            format: uuid
        - name: title
          in: query
          description: Search by title (case-insensitive, partial match)
          schema:
            type: string
        - name: stage
          in: query
          description: Filter by stage
          schema:
            $ref: '#/components/schemas/DealStage'
        - name: source
          in: query
          schema:
            $ref: '#/components/schemas/DealSource'
        - name: from_date
          in: query
          description: Filter by created_at >=
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          description: Filter by created_at <=
          schema:
            type: string
            format: date-time
        - name: min_value
          in: query
          schema:
            type: number
        - name: max_value
          in: query
          schema:
            type: number
        - name: search
          in: query
          description: Full-text search on title and notes
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, updated_at, estimated_value, actual_value, closed_at]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated deal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealPage'

    post:
      tags: [Deals]
      summary: Create a deal
      description: |
        `client_id` is immutable after creation. The deal starts in `stage=new_lead`.
        Use `/deals/{id}/stage` to advance the pipeline stage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Created deal
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /deals/{deal_id}:
    parameters:
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [Deals]
      summary: Get deal detail
      responses:
        '200':
          description: Deal detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Deals]
      summary: Update deal (blocked on terminal stages)
      description: |
        Partial update — only provided fields are changed. Returns 409 if the deal is
        in a terminal stage (`completed_and_billed` or `lost`). `client_id` cannot be
        changed after creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Updated deal
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealResponse'
        '409':
          description: Deal is in a terminal stage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Deals]
      summary: Soft-delete a deal
      responses:
        '204':
          description: Deal deleted

  /deals/{deal_id}/document:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Upload a PDF document to a deal
      description: |
        Accepts a single PDF file (`application/pdf`, max 20MB) as multipart form data,
        stores it in object storage, and sets `document_url`/`document_filename` on the
        deal. Re-uploading replaces the previously stored document. Also appends a
        `document_attached` entry to the deal's activity log.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated deal with new document_url
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Not a PDF, empty, or exceeds 20MB (VALIDATION_FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /deals/{deal_id}/stage:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Advance deal to next pipeline stage
      description: |
        Stage transitions are **forward-only**. Terminal stages (`completed_and_billed`,
        `lost`) cannot be exited. Business prerequisites:
        - Transitioning to `active` requires at least one accepted proposal.
        - Transitioning to `completed_and_billed` requires at least one invoice linked to the deal.
        - Moving to `lost` or `completed_and_billed` sets `closed_at` and auto-cancels all pending reminders.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StageTransitionRequest'
      responses:
        '200':
          description: Deal with updated stage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealResponse'
        '400':
          description: Invalid transition or missing prerequisites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /deals/intakes:
    get:
      tags: [Deals]
      summary: List deal intakes
      description: Returns all intake submissions received by the authenticated owner, ordered by submission date descending.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of intakes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/IntakeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /deals/intakes/{intake_id}:
    parameters:
      - name: intake_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Deals]
      summary: Get a single deal intake
      description: Returns the intake record identified by intake_id. Only accessible by the owner.
      responses:
        '200':
          description: Intake detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IntakeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /deals/{deal_id}/qualify:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Trigger AI lead qualification for a deal
      description: |
        Runs AI lead qualification for the deal. Builds inquiry context from the
        linked intake if one exists, otherwise falls back to the deal title and notes.
        Saves the score, confidence, recommendation, and signal fields back to the deal.
        Requires an active AI-enabled subscription (returns 402 otherwise).
        The result is informational — it does not trigger an automatic stage change.
      responses:
        '200':
          description: Qualification result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LeadQualificationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'

  /deals/{deal_id}/activity:
    parameters:
      - $ref: '#/components/parameters/DealId'
    get:
      tags: [Deals]
      summary: List activity timeline for a deal
      description: Full chronological history of stage changes, notes added, and AI qualification events for this deal.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: entry_type
          in: query
          schema:
            $ref: '#/components/schemas/DealActivityType'
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated activity entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealActivityPage'

  /deals/{deal_id}/notes:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Deals]
      summary: Append a note to a deal activity log
      description: Append-only — notes cannot be edited or deleted after creation. Use this to record freeform observations or meeting outcomes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNoteRequest'
      responses:
        '201':
          description: Note added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DealActivityEntryResponse'

  # -------------------------------------------------------------------------
  # PROPOSALS
  # -------------------------------------------------------------------------
  /proposals:
    get:
      tags: [Proposals]
      summary: List proposals
      description: |
        Returns proposals owned by the authenticated user. At most one proposal per deal
        may be in `sent` status at any time — creating a new revision sets the previous
        one to `superseded`.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/ProposalStatus'
        - name: ai_generated
          in: query
          schema:
            type: boolean
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, sent_at, version_number]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated proposal list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalPage'

    post:
      tags: [Proposals]
      summary: Create a proposal draft
      description: |
        Creates a proposal in `draft` status linked to the specified deal. `content` is
        optional at creation — use `PATCH` to fill manually or
        `/proposals/{id}/generate` to populate with AI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposalRequest'
      responses:
        '201':
          description: Created proposal
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /proposals/{proposal_id}:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    get:
      tags: [Proposals]
      summary: Get proposal detail
      responses:
        '200':
          description: Proposal detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Proposals]
      summary: Update proposal (draft only)
      description: Updates are only allowed while `status=draft`. Any other status returns 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProposalRequest'
      responses:
        '200':
          description: Updated proposal
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '409':
          description: Proposal is not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Proposals]
      summary: Delete a draft proposal
      responses:
        '204':
          description: Proposal deleted
        '409':
          description: Only draft proposals can be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/{proposal_id}/send:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    post:
      tags: [Proposals]
      summary: Send proposal to client (generates share link, locks content)
      description: |
        Transitions status `draft → sent`. Generates a `share_token` for the client-facing
        link. Validates that `pricing.total` matches the sum of line item `amount` values.
        If another proposal for the same deal is currently `sent`, it moves to `superseded`.
        Content is locked — no further PATCH is possible after sending.
      responses:
        '200':
          description: Proposal sent with share_token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '400':
          description: Pricing total mismatch or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/{proposal_id}/pdf:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    get:
      tags: [Proposals]
      summary: Download proposal as PDF
      description: |
        Renders the proposal content as an A4 PDF using WeasyPrint and returns it as a
        binary download. The PDF is generated on the fly — no file is stored server-side.
        Requires the proposal to belong to the authenticated user.
      responses:
        '200':
          description: PDF file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              example: 'attachment; filename="proposal-<id>.pdf"'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /proposals/{proposal_id}/generate:
    parameters:
      - $ref: '#/components/parameters/ProposalId'
    post:
      tags: [Proposals]
      summary: Trigger AI generation to fill/replace proposal content (returns draft)
      description: |
        Requires an active AI-enabled subscription (returns 402 otherwise). Writes
        AI-drafted content into the proposal but keeps `status=draft`. User must review
        and explicitly call `/send` to deliver to the client.
      responses:
        '200':
          description: Proposal updated with AI-generated draft content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /proposals/generate-from-deal/{deal_id}:
    parameters:
      - $ref: '#/components/parameters/DealId'
    post:
      tags: [Proposals]
      summary: Generate a proposal from a deal in one call
      description: |
        Auto-fetches the deal, linked client, and authenticated user profile, then
        calls the AI to produce a fully-drafted proposal saved as `status=draft`.
        Requires an active AI-enabled subscription (returns 402 otherwise).
        Returns 404 if the deal does not exist or belongs to another user.
      responses:
        '201':
          description: AI-generated proposal created as draft
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '404':
          $ref: '#/components/responses/NotFound'

  # Public — no auth required
  /proposals/public/{share_token}:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    get:
      tags: [Public]
      summary: View a proposal via shareable link (client-facing, no auth)
      description: |
        No authentication required. Returns a read-only view with no internal IDs
        exposed. Returns 410 if the `share_token` has expired (default window: 30 days).
      security: []
      responses:
        '200':
          description: Proposal read-only view
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicProposalResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Share link expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proposals/public/{share_token}/respond:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    post:
      tags: [Public]
      summary: Client submits accept or reject response
      description: |
        Client decision is **final** — once the proposal is `accepted` or `rejected` it
        cannot change status. Accepting emits a `proposals.proposal_accepted` domain event
        which may advance the linked deal stage.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalRespondRequest'
      responses:
        '200':
          description: Response recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicProposalResponse'
        '409':
          description: Proposal already responded or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # CONTRACTS
  # -------------------------------------------------------------------------
  /contracts:
    get:
      tags: [Contracts]
      summary: List contracts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/ContractStatus'
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, effective_date, end_date]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated contract list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractPage'

    post:
      tags: [Contracts]
      summary: Create a contract from an accepted proposal
      description: |
        The source proposal must have `status=accepted`. Only one contract per deal may
        be in `active` or `pending_signatures` at a time (enforced by a partial unique
        index — returns 409 on violation). `client_snapshot` is captured from the live
        client record at creation and **never updated** afterward.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractRequest'
      responses:
        '201':
          description: Contract draft created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Proposal not accepted or active contract already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /contracts/{contract_id}:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      tags: [Contracts]
      summary: Get contract detail
      responses:
        '200':
          description: Contract detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Contracts]
      summary: Update contract content (draft only)
      description: |
        Content updates are only allowed while `status=draft`. `deal_id`, `proposal_id`,
        and `client_id` are immutable after creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractRequest'
      responses:
        '200':
          description: Updated contract
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'
        '409':
          description: Contract is not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /contracts/{contract_id}/send:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    post:
      tags: [Contracts]
      summary: Move contract to pending_signatures and generate share link
      description: |
        Transitions `draft → pending_signatures`. Generates a `share_token` for the
        client signature link. Contract content is locked after this — no further
        PATCH updates are allowed.
      responses:
        '200':
          description: Contract sent for signatures
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'

  /contracts/{contract_id}/sign:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    post:
      tags: [Contracts]
      summary: Record freelancer signature
      description: |
        Records the freelancer's signature timestamp. If the client has already signed
        (via the public share link), the contract status transitions to `active`
        immediately. Otherwise it remains `pending_signatures` awaiting the client.
      responses:
        '200':
          description: Signature recorded; activates if both parties have signed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'

  /contracts/{contract_id}/amend:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    post:
      tags: [Contracts]
      summary: Create an amendment (new version) of an active contract
      description: |
        Creates a new contract draft (incremented `version_number`) from the active
        contract. The previous active contract moves to `archived`. `deal_id` and
        `proposal_id` are preserved. Only allowed when `status=active`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractRequest'
      responses:
        '201':
          description: New contract version created as draft; previous archived
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'
        '409':
          description: Contract is not in active status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /contracts/{contract_id}/terminate:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    post:
      tags: [Contracts]
      summary: Terminate a contract
      description: |
        Sets `status=terminated` and stores the termination reason. This is a
        **terminal state** — the contract cannot be reactivated. All pending reminders
        linked to this contract are auto-cancelled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractTerminateRequest'
      responses:
        '200':
          description: Contract terminated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'

  /contracts/{contract_id}/generate:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    post:
      tags: [Contracts]
      summary: Trigger AI generation to fill contract content (draft only)
      description: |
        Requires an active AI-enabled subscription (returns 402 otherwise). Populates
        contract clauses based on the linked proposal and client snapshot. The contract
        stays in `draft` — user must review, then call `/send` to initiate signing.
      responses:
        '200':
          description: Contract updated with AI-generated draft content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /contracts/{contract_id}/milestones:
    parameters:
      - $ref: '#/components/parameters/ContractId'
    get:
      tags: [Contracts]
      summary: List payment milestones for a contract
      responses:
        '200':
          description: Milestone list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentMilestoneResponse'
    post:
      tags: [Contracts]
      summary: Add a payment milestone (draft only)
      description: Milestones can only be added or changed while the contract is in `draft` status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentMilestoneRequest'
      responses:
        '201':
          description: Milestone created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentMilestoneResponse'

  /contracts/{contract_id}/milestones/{milestone_id}:
    parameters:
      - $ref: '#/components/parameters/ContractId'
      - name: milestone_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Contracts]
      summary: Update a milestone (draft contract only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentMilestoneRequest'
      responses:
        '200':
          description: Updated milestone
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentMilestoneResponse'
    delete:
      tags: [Contracts]
      summary: Delete a milestone (draft contract only)
      responses:
        '204':
          description: Milestone deleted

  /contracts/public/{share_token}:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    get:
      tags: [Public]
      summary: View a contract via shareable link (client-facing, no auth)
      description: |
        No authentication required. Returns only the fields needed for the client to
        review and sign. Returns 410 if the share link has expired.
      security: []
      responses:
        '200':
          description: Contract read-only view
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicContractResponse'
        '410':
          description: Share link expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /contracts/public/{share_token}/sign:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    post:
      tags: [Public]
      summary: Client submits signature via share link
      description: |
        Records the client's signature by name (`signer_name`) along with a timestamp.
        If the freelancer has already signed via `/contracts/{id}/sign`, the contract
        transitions to `active` immediately.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientSignRequest'
      responses:
        '200':
          description: Signature recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicContractResponse'

  # -------------------------------------------------------------------------
  # INVOICES
  # -------------------------------------------------------------------------
  /invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      description: |
        Returns invoices scoped to the authenticated user. Use `overdue_only=true` to
        retrieve invoices past `due_date` with outstanding balance (useful for reminder
        workflows).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          description: Filter by status
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
        - name: invoice_number
          in: query
          description: Search by invoice number (partial match)
          schema:
            type: string
        - name: from_issue_date
          in: query
          schema:
            type: string
            format: date
        - name: to_issue_date
          in: query
          schema:
            type: string
            format: date
        - name: from_due_date
          in: query
          schema:
            type: string
            format: date
        - name: to_due_date
          in: query
          schema:
            type: string
            format: date
        - name: overdue_only
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [issue_date, due_date, total, created_at]
            default: issue_date
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoicePage'

    post:
      tags: [Invoices]
      summary: Create an invoice
      description: |
        An invoice **must** have `contract_id` or `deal_id` (or both) — standalone
        invoices are rejected. Requires at least one line item. `total` is calculated
        server-side as `subtotal + tax_amount`; the invoice starts in `draft` status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Created invoice
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /invoices/{invoice_id}:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'
    get:
      tags: [Invoices]
      summary: Get invoice detail
      responses:
        '200':
          description: Invoice detail with line items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Invoices]
      summary: Update invoice (draft only)
      description: |
        Updates only allowed while `status=draft`. If `line_items` is provided, it
        **replaces** the entire line item list rather than merging.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceRequest'
      responses:
        '200':
          description: Updated invoice
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'
        '409':
          description: Invoice is not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/{invoice_id}/send:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'
    post:
      tags: [Invoices]
      summary: Send invoice to client
      description: |
        Validates that `total = subtotal + tax_amount` before allowing the transition
        `draft → sent`. Generates a `share_token` for the client-facing view link.
      responses:
        '200':
          description: Invoice sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'

  /invoices/{invoice_id}/void:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'
    post:
      tags: [Invoices]
      summary: Void an invoice (not permitted on paid invoices)
      description: |
        Marks the invoice as `void`. Not permitted if any payment has been recorded
        (`status=paid` or `partially_paid`). Voided invoices cannot be restored.
      responses:
        '200':
          description: Invoice voided
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'
        '409':
          description: Invoice is paid and cannot be voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/{invoice_id}/payments:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'
    get:
      tags: [Invoices]
      summary: List payment records for an invoice
      description: Returns all payment records in chronological order. Append-only — individual records cannot be edited or deleted.
      responses:
        '200':
          description: Payment records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentRecordResponse'
    post:
      tags: [Invoices]
      summary: Record a payment against an invoice
      description: |
        Records a partial or full payment. `amount_paid` cannot exceed `total` — any
        submission that would cause overpayment is rejected with 400. When
        `amount_paid` reaches `total`, invoice status automatically becomes `paid`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Payment recorded; invoice status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InvoiceResponse'
        '400':
          description: Payment would exceed invoice total
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/{invoice_id}/payment-link:
    parameters:
      - $ref: '#/components/parameters/InvoiceId'
    post:
      tags: [Payments]
      summary: Create a client payment link for an invoice
      description: Generates a Vietnam-friendly payment instruction or checkout link, such as MoMo deep link or bank-transfer QR, for use in invoice reminders.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentLinkRequest'
      responses:
        '201':
          description: Payment link created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentIntentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invoice is already paid or cannot accept payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments/methods:
    get:
      tags: [Payments]
      summary: List enabled payment methods for the current user
      description: Returns the freelancer's configured payment methods (MoMo, bank transfer, VNPay, etc.) with account labels and supported currencies.
      responses:
        '200':
          description: Enabled payment methods and account instructions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentMethodConfigResponse'

  /payments/intents/{payment_intent_id}:
    parameters:
      - $ref: '#/components/parameters/PaymentIntentId'
    get:
      tags: [Payments]
      summary: Get payment intent status
      responses:
        '200':
          description: Payment intent detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentIntentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/intents/{payment_intent_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/PaymentIntentId'
    post:
      tags: [Payments]
      summary: Cancel an unpaid payment intent
      description: Only `pending` or `processing` intents can be cancelled. Returns 409 if the intent is already `succeeded` or `expired`.
      responses:
        '200':
          description: Payment intent cancelled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentIntentResponse'
        '409':
          description: Payment intent is already completed or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payments/webhooks/{provider}:
    post:
      tags: [Payments]
      summary: Receive payment provider webhook callback
      description: |
        Accepts the raw provider payload for asynchronous verification by a Celery worker.
        Responds immediately with 202 — actual payment recording happens after signature
        verification. Use `event_id` for idempotent processing.
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/PaymentProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookRequest'
      responses:
        '202':
          description: Webhook accepted for asynchronous verification
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaymentWebhookAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /invoices/public/{share_token}:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    get:
      tags: [Public]
      summary: View an invoice via shareable link (client-facing, no auth)
      description: No authentication required. Returns 410 if the share link has expired.
      security: []
      responses:
        '200':
          description: Invoice read-only view
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicInvoiceResponse'
        '410':
          description: Share link expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/public/{share_token}/payment-options:
    parameters:
      - $ref: '#/components/parameters/ShareToken'
    get:
      tags: [Invoices, Payments, Public]
      summary: List client-facing payment options for a shared invoice
      security: []
      responses:
        '200':
          description: Payment options available to the invoice recipient
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PublicPaymentOptionsResponse'
        '410':
          description: Share link expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # REMINDERS
  # -------------------------------------------------------------------------
  /reminders:
    get:
      tags: [Reminders]
      summary: List reminders
      description: Returns reminders owned by the authenticated user. Use `target_type` to fetch reminders scoped to a specific deal, proposal, invoice, or contract.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReminderStatus'
        - name: target_type
          in: query
          description: "Filter by target type: deal, proposal, contract, invoice"
          schema:
            $ref: '#/components/schemas/ReminderTargetType'
        - name: reminder_type
          in: query
          schema:
            $ref: '#/components/schemas/ReminderType'
        - name: from_scheduled_at
          in: query
          schema:
            type: string
            format: date-time
        - name: to_scheduled_at
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [scheduled_at, created_at]
            default: scheduled_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated reminder list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderPage'

    post:
      tags: [Reminders]
      summary: Create a reminder
      description: |
        `scheduled_at` must be in the future. `target_id` is **not** backed by a
        database foreign key — the application layer verifies that the target exists and
        is owned by the caller. Supports recurring reminders via `recurrence_rule`
        (RRULE, RFC 5545 format).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '201':
          description: Reminder created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReminderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /reminders/{reminder_id}:
    parameters:
      - $ref: '#/components/parameters/ReminderId'
    get:
      tags: [Reminders]
      summary: Get reminder detail
      responses:
        '200':
          description: Reminder detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReminderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reminders]
      summary: Update a pending reminder
      description: Only reminders in `pending` status can be updated. Sent, failed, or cancelled reminders are immutable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderRequest'
      responses:
        '200':
          description: Updated reminder
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReminderResponse'
        '409':
          description: Reminder is not in pending status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Reminders]
      summary: Cancel a pending reminder
      description: Sets `status=cancelled`. If the Celery task has not yet been dispatched, it is revoked. Sent or failed reminders cannot be cancelled.
      responses:
        '204':
          description: Reminder cancelled

  # -------------------------------------------------------------------------
  # ANALYTICS
  # -------------------------------------------------------------------------
  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Pre-computed dashboard summary (active deals, pipeline value, MRR, overdue count, win rate)
      description: |
        Pre-computed snapshot refreshed periodically (not real-time). All metrics are
        scoped strictly to the authenticated user's `owner_user_id` — cross-user data
        is never exposed.
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardResponse'

  /analytics/revenue:
    get:
      tags: [Analytics]
      summary: Revenue metrics snapshot for a given period
      description: "`from_date` and `to_date` are inclusive. `period_type` determines aggregation granularity (monthly, quarterly, yearly). Read-only — never writes to operational tables."
      parameters:
        - name: period_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PeriodType'
        - name: from_date
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Revenue metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RevenueResponse'

  /analytics/pipeline:
    get:
      tags: [Analytics]
      summary: Pipeline distribution snapshot
      description: "`snapshot_date` defaults to today if not provided. Returns deal count and total estimated value per pipeline stage."
      parameters:
        - name: snapshot_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Pipeline metrics by stage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                            $ref: '#/components/schemas/PipelineStageResponse'

  /analytics/win-rate:
    get:
      tags: [Analytics]
      summary: Win rate and funnel conversion rates
      description: "`win_rate = deals_won / (deals_won + deals_lost)`. Only closed deals (`completed_and_billed` or `lost`) are included. Date range is optional — omitting it returns all-time metrics."
      parameters:
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Win rate metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/WinRateResponse'

  /analytics/clients/top:
    get:
      tags: [Analytics]
      summary: Top clients by revenue
      description: Ranked by the selected `metric` (defaults to `total_collected`). Returns at most `min(limit, 50)` entries. Scoped to the authenticated user.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: metric
          in: query
          schema:
            type: string
            enum: [total_invoiced, total_collected]
            default: total_collected
      responses:
        '200':
          description: Top client list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                            $ref: '#/components/schemas/TopClientResponse'

  /analytics/ai-usage:
    get:
      tags: [Analytics]
      summary: AI generation usage counters for current user
      description: Aggregates `ai_cost_records` for the authenticated user. Date range is optional — omitting it returns all-time totals.
      parameters:
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: AI usage metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiUsageResponse'

  # -------------------------------------------------------------------------
  # AI
  # -------------------------------------------------------------------------
  /ai/leads/qualify:
    post:
      tags: [AI]
      summary: Qualify a lead (standalone; also available via /deals/{id}/qualify)
      description: |
        Standalone alternative to `/deals/{id}/qualify`. Consumes one AI generation
        from the subscription quota. Result is informational only — does **not** modify
        the deal record or trigger a stage change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadQualificationRequest'
      responses:
        '200':
          description: Qualification result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LeadQualificationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /ai/proposals/generate:
    post:
      tags: [AI]
      summary: Generate a proposal draft for a deal
      description: |
        Requires an active AI-enabled subscription (returns 402 otherwise). Creates or
        updates the proposal with AI-drafted content in `draft` status. User must review
        the content and explicitly call `/proposals/{id}/send` to deliver it to the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposalGenerationRequest'
      responses:
        '200':
          description: AI-generated proposal draft content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProposalGenerationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /ai/contracts/generate:
    post:
      tags: [AI]
      summary: Generate a contract draft from an accepted proposal
      description: |
        Requires an active AI-enabled subscription (returns 402 otherwise). The target
        contract must be in `draft` status. Populates contract clauses based on the
        linked proposal content and client snapshot. Status remains `draft` until
        the freelancer calls `/contracts/{id}/send`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractGenerationRequest'
      responses:
        '200':
          description: AI-generated contract draft content
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContractGenerationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  /ai/followups/generate:
    post:
      tags: [AI]
      summary: Generate a follow-up message draft
      description: |
        Requires an active AI-enabled subscription (returns 402 otherwise). Generates a
        message draft appropriate for the given `reminder_type` and target context. Does
        **not** send the message — the user must copy it or trigger delivery separately
        via the Reminders API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowUpGenerationRequest'
      responses:
        '200':
          description: AI-generated follow-up message
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/FollowUpGenerationResponse'
        '402':
          $ref: '#/components/responses/PaymentRequired'

  # -------------------------------------------------------------------------
  # AI JOBS — background-tracked counterparts to the synchronous AI endpoints
  # -------------------------------------------------------------------------
  /ai/jobs:
    get:
      tags: [AI Jobs]
      summary: List AI jobs
      description: |
        Returns jobs owned by the authenticated user, optionally filtered by
        entity. Used by the client to restore in-progress job state after a
        page refresh or when returning to an entity's detail view.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: entity_type
          in: query
          schema:
            $ref: '#/components/schemas/AiJobEntityType'
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated AI job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiJobPage'
    post:
      tags: [AI Jobs]
      summary: Create a background AI generation job
      description: |
        Creates an `AiJob` row and dispatches it to a Celery worker; returns
        immediately with `status=queued` rather than blocking on the LLM call.

        `entity_type` must match `type`: `lead_qualifier` and
        `proposal_generator` target `entity_type=deal`; `contract_generator`
        targets `entity_type=contract` (the contract must already exist in
        `draft` status — created from an accepted proposal via `/contracts`).

        Pass `idempotency_key` to make retried client requests safe — a
        second request with the same key returns the original job instead of
        creating a duplicate. Even without a key, a request for the same
        `(type, entity_type, entity_id)` while an active (`queued`/`running`)
        job already exists returns that job instead of enqueuing a second one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAiJobRequest'
      responses:
        '201':
          description: Job created (or an existing queued/running/idempotent-replay job returned)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: entity_type does not match what `type` requires
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/jobs/{job_id}:
    parameters:
      - $ref: '#/components/parameters/AiJobId'
    get:
      tags: [AI Jobs]
      summary: Poll an AI job's status/result
      description: |
        Returns 404 if the job does not exist or belongs to another user.
        `result` and `error` are `null` until the job reaches a terminal
        status (`succeeded`/`failed`/`cancelled`).
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /ai/jobs/{job_id}/cancel:
    parameters:
      - $ref: '#/components/parameters/AiJobId'
    post:
      tags: [AI Jobs]
      summary: Cancel a queued or running AI job (best-effort)
      description: |
        Only valid while `status` is `queued` or `running` — returns 409
        otherwise. This is best-effort: a job already mid-LLM-call cannot be
        forcibly interrupted, but the worker checks for cancellation before
        writing its result and will not overwrite `status=cancelled`.
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AiJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Job is already in a terminal status (succeeded/failed/cancelled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # ADMIN — requires role: admin
  # -------------------------------------------------------------------------
  /admin/users:
    get:
      tags: [Admin]
      summary: List all platform users
      description: Requires `role=admin` in the JWT. Returns all users regardless of owner scope. Cross-user data access — admin-only.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: search
          in: query
          description: Search by name or email
          schema:
            type: string
        - name: plan_slug
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, email, full_name, status]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPage'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/users/{user_id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Admin]
      summary: Get any user profile (read-only)
      description: Full profile including nested `subscription` and `deleted_at` timestamp. Read-only — use PATCH to modify.
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin]
      summary: Update user identity, role, or status
      description: |
        Changes `role`, `status`, `full_name`, `email`, or `phone`. Changing `email` or
        `phone` triggers a uniqueness check across all users and returns 409 if already
        taken by someone else. Every change is written to the audit log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/users/{user_id}/suspend:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Admin]
      summary: Suspend a user account
      description: |
        Sets `status=suspended` and immediately revokes all active sessions. The
        suspended user loses access to AI features but can still read their existing
        data. Cannot suspend the last admin account.
      responses:
        '200':
          description: User suspended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserResponse'
        '409':
          description: Cannot suspend the last admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}/reinstate:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      tags: [Admin]
      summary: Reinstate a suspended user
      description: Restores `status=active`. Does not restore previous sessions — the user must log in again.
      responses:
        '200':
          description: User reinstated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserResponse'

  /admin/users/{user_id}/sessions:
    parameters:
      - $ref: '#/components/parameters/UserId'
    delete:
      tags: [Admin]
      summary: Revoke all active sessions for a user
      description: Force-revokes all active JWT sessions by blacklisting tokens in Redis. Useful after a security incident or account compromise.
      responses:
        '204':
          description: Sessions revoked

  /admin/subscriptions:
    get:
      tags: [Admin]
      summary: List all platform subscriptions
      description: Cross-user subscription data — admin-only. Use to monitor plan distribution, past-due accounts, or upcoming renewals.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SubscriptionStatus'
        - name: plan_slug
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, current_period_end]
            default: created_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Paginated subscription list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscriptionPage'

  /admin/subscriptions/{subscription_id}/override:
    parameters:
      - name: subscription_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Admin]
      summary: Manually override a user's subscription plan or status
      description: |
        Used for trial access, compensations, or support escalations. `override_expires_at`
        specifies when the override ends and the subscription returns to its normal plan.
        Logged to the audit log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSubscriptionOverrideRequest'
      responses:
        '200':
          description: Subscription overridden
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionResponse'

  /admin/plans:
    get:
      tags: [Admin]
      summary: List all plans including inactive
      description: Returns all plans regardless of `is_active`. Use `/subscriptions/plans` for the public catalog shown to users.
      responses:
        '200':
          description: All plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SubscriptionPlanResponse'
    post:
      tags: [Admin]
      summary: Create a new subscription plan
      description: |
        Creates a new plan, always active. Existing subscribers are not affected — they
        remain on their current plan until they explicitly change it. To deactivate a plan,
        use PATCH /admin/plans/{plan_id}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreatePlanRequest'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionPlanResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/plans/{plan_id}:
    parameters:
      - $ref: '#/components/parameters/PlanId'
    get:
      tags: [Admin]
      summary: Get a single plan by ID
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionPlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin]
      summary: Update a plan (partial — name, pricing, limits, or active state)
      description: |
        Partial update — only provided fields are changed. Deactivating (`is_active=false`)
        hides the plan from the public catalog but does not cancel existing subscriptions
        on that plan. Changing `name` or `slug` returns 409 if already used by another plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdatePlanRequest'
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscriptionPlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/ai-costs:
    get:
      tags: [Admin]
      summary: Platform-wide AI cost records
      description: Read-only view of all LLM generation records with token counts and USD cost estimates across all users. Includes aggregate totals for the filtered period.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: ai_module
          in: query
          schema:
            $ref: '#/components/schemas/AIModuleType'
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [occurred_at, estimated_cost_usd]
            default: occurred_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: AI cost records with aggregate totals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AICostPage'

  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: Platform audit log
      description: Immutable, append-only log of admin and user actions. Entries cannot be deleted or modified. Use `event_type` and `actor_user_id` to narrow the search.
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: event_type
          in: query
          schema:
            type: string
        - name: target_type
          in: query
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [occurred_at]
            default: occurred_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPage'

  /admin/templates:
    get:
      tags: [Admin]
      summary: List system templates
      parameters:
        - name: template_type
          in: query
          schema:
            $ref: '#/components/schemas/TemplateType'
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SystemTemplateResponse'
    post:
      tags: [Admin]
      summary: Create a system templates
      description: Creates a new templates starting at `version_number=1`. Set `plan_tier_required` to restrict availability to paid plans.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSystemTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemTemplateResponse'

  /admin/templates/{template_id}:
    parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Admin]
      summary: Activate, deactivate, or update a templates
      description: Setting `is_active=false` hides the templates from AI generation without deleting it. Content changes increment `version_number`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemTemplateRequest'
      responses:
        '200':
          description: Updated templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SystemTemplateResponse'

  /admin/feature-flags:
    get:
      tags: [Admin]
      summary: List all feature flags
      description: Returns all flags with `rollout_percentage` and optional `target_user_ids` for gradual rollouts.
      responses:
        '200':
          description: Feature flags
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponseBase'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FeatureFlagResponse'

