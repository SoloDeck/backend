    patch:
      tags: [Admin]
      summary: Activate, deactivate, or update a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemTemplateRequest'
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemTemplateResponse'

  /admin/feature-flags:
    get:
      tags: [Admin]
      summary: List all feature flags
      responses:
        '200':
