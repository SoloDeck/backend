      summary: Update a feature flag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureFlagRequest'
      responses:
        '200':
          description: Updated flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/platform-metrics:
    get:
      tags: [Admin]
      summary: Platform-wide health metrics snapshot
