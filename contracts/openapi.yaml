            type: string
        - name: target_id
          in: query
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          schema:
            type: string
            format: date-time
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [occurred_at]
            default: occurred_at
        - $ref: '#/components/parameters/SortOrder'
      responses:
        '200':
          description: Audit log entries
