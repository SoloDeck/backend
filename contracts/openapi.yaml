    parameters:
      - name: flag_name
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Admin]
      summary: Update a feature flag
      description: Changes take effect immediately without a deploy. Use `rollout_percentage` for gradual rollouts and `target_user_ids` for targeted beta access.
      requestBody:
        required: true
        content:
          application/json:
