        contracts_generated:
          type: integer
        leads_qualified:
          type: integer
        followups_generated:
          type: integer
        total_generations:
          type: integer
        period_start:
          type: string
          format: date
          nullable: true
        period_end:
          type: string
          format: date
          nullable: true

    # --- AI ---
