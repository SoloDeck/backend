name: Backend CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: lint + typecheck + unit — python:3.13-slim, no Docker needed
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Lint
        run: ruff check src tests

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Type check
        run: mypy src

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Phase 2: integration tests — uses GitHub Actions services (no docker compose)
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests
    needs: [lint, typecheck, unit-test]
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    if: github.event_name == 'pull_request'
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solodesk
          POSTGRES_PASSWORD: solodesk
          POSTGRES_DB: solodesk_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
      TEST_DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      SECRET_KEY: ${{ secrets.SECRET_KEY_CI || 'ci-test-secret-key-32-chars-min!!' }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY_CI || 'ci-test-jwt-key-32-chars-minimum!' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"
      - name: Run migrations
        run: python scripts/bootstrap.py
      - name: Run integration tests
        run: pytest tests/integration -v

  # ---------------------------------------------------------------------------
  # Phase 3: build Docker images — ubuntu-latest has Docker, main push only
  # ---------------------------------------------------------------------------
  build-image:
    name: Build / Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV

      - name: Build + push runtime
        run: |
          docker buildx build --target runtime \
            -t $REGISTRY:${{ github.sha }} \
            -t $REGISTRY:latest \
            --push .

      - name: Build + push worker
        run: |
          docker buildx build --target worker \
            -t $REGISTRY-worker:${{ github.sha }} \
            -t $REGISTRY-worker:latest \
            --push .

      - name: Build + push beat
        run: |
          docker buildx build --target beat \
            -t $REGISTRY-beat:${{ github.sha }} \
            -t $REGISTRY-beat:latest \
            --push .

  # ---------------------------------------------------------------------------
  # Phase 4a: deploy staging — self-hosted Windows + PowerShell
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy / API / Staging
    needs: [build-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, X64]
    environment:
      name: staging
      url: https://staging-api.solodesk.space
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "IMAGE_NAME=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write staging .env
        shell: powershell
        run: |
          @"
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL=${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_FREE_PLAN_PRICE_ID=${{ secrets.STRIPE_FREE_PLAN_PRICE_ID }}
          STORAGE_ENDPOINT=${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_ACCESS_KEY=${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY=${{ secrets.STORAGE_SECRET_KEY }}
          STORAGE_REGION=${{ secrets.STORAGE_REGION }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          ZALO_OA_ACCESS_TOKEN=${{ secrets.ZALO_OA_ACCESS_TOKEN }}
          APP_ENV=staging
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull latest images
        shell: powershell
        run: docker compose pull api worker beat

      - name: Deploy
        shell: powershell
        run: docker compose up -d api worker beat

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Remove-Item -Force .env -ErrorAction SilentlyContinue
          docker image prune -a -f

  # ---------------------------------------------------------------------------
  # Phase 4b: deploy production — requires manual approval
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy / API / Main
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, X64]
    environment:
      name: production
      url: https://api.solodesk.space
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "IMAGE_NAME=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write production .env
        shell: powershell
        run: |
          @"
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL=${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_FREE_PLAN_PRICE_ID=${{ secrets.STRIPE_FREE_PLAN_PRICE_ID }}
          STORAGE_ENDPOINT=${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_ACCESS_KEY=${{ secrets.STORAGE_ACCESS_KEY }}
          STORAGE_SECRET_KEY=${{ secrets.STORAGE_SECRET_KEY }}
          STORAGE_REGION=${{ secrets.STORAGE_REGION }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          ZALO_OA_ACCESS_TOKEN=${{ secrets.ZALO_OA_ACCESS_TOKEN }}
          APP_ENV=production
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull latest images
        shell: powershell
        run: docker compose pull api worker beat

      - name: Deploy
        shell: powershell
        run: docker compose up -d api worker beat

      - name: Cleanup
        if: always()
        shell: powershell
        run: |
          Remove-Item -Force .env -ErrorAction SilentlyContinue
          docker image prune -a -f
