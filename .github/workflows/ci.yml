name: CI / CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deny all permissions by default — each job grants only what it needs
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Phase 1: Unit Tests (No Database)
  # -------------------------------------------------------------------------
  test-unit:
    name: Test / Unit
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:0.11.21-python3.13-trixie-slim
    timeout-minutes: 10
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run unit tests
        env:
          SKIP_DB_INIT: 1
          SECRET_KEY: ci-test-secret-key-32-chars-min!!
          JWT_SECRET_KEY: ci-test-jwt-key-32-chars-minimum!
        run: uv run pytest tests/unit -v

  # -------------------------------------------------------------------------
  # Phase 2: Integration Tests (With Database & Redis)
  # -------------------------------------------------------------------------
  test-integration:
    name: Test / Integration
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:0.11.21-python3.13-trixie-slim
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solodesk
          POSTGRES_PASSWORD: solodesk
          POSTGRES_DB: solodesk_test
      redis:
        image: redis:7-alpine
    timeout-minutes: 15
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
          DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-min!!
          JWT_SECRET_KEY: ci-test-jwt-key-32-chars-minimum!
        run: uv run pytest tests/integration -v

  # -------------------------------------------------------------------------
  # Phase 3: Build Image (Only if all tests pass)
  # -------------------------------------------------------------------------
  build-image:
    name: Build / Image
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Build and push
        run: |
          docker build --target runtime -t ${{ env.REGISTRY }}/solodesk-backend:latest .
          docker build --target worker  -t ${{ env.REGISTRY }}/solodesk-backend-worker:latest .
          docker build --target beat    -t ${{ env.REGISTRY }}/solodesk-backend-beat:latest .
          docker push ${{ env.REGISTRY }}/solodesk-backend:latest
          docker push ${{ env.REGISTRY }}/solodesk-backend-worker:latest
          docker push ${{ env.REGISTRY }}/solodesk-backend-beat:latest

  # -------------------------------------------------------------------------
  # Phase 4: Deploy
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy / Staging
    runs-on: [self-hosted]
    needs: build-image
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write staging .env
        shell: powershell
        run: |
          @"
          APP_ENV=staging
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL=${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID=${{ vars.GOOGLE_ANDROID_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID=${{ vars.GOOGLE_IOS_CLIENT_ID }}
          ZALO_OA_ACCESS_TOKEN=${{ secrets.ZALO_OA_ACCESS_TOKEN }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          API_PORT=${{ vars.API_PORT }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          $env:IMAGE_NAME = "ghcr.io/$repoLower/solodesk-backend"
          $env:API_PORT = "${{ vars.API_PORT }}"
          docker compose -p solodesk-backend-staging pull api worker beat
          docker compose -p solodesk-backend-staging up -d api worker beat

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue

  deploy-production:
    name: Deploy / Production
    runs-on: [self-hosted]
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write production .env
        shell: powershell
        run: |
          @"
          APP_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL=${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.REDIS_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_ANDROID_CLIENT_ID=${{ vars.GOOGLE_ANDROID_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID=${{ vars.GOOGLE_IOS_CLIENT_ID }}
          ZALO_OA_ACCESS_TOKEN=${{ secrets.ZALO_OA_ACCESS_TOKEN }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          API_PORT=${{ vars.API_PORT }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          $env:IMAGE_NAME = "ghcr.io/$repoLower/solodesk-backend"
          $env:API_PORT = "${{ vars.API_PORT }}"
          docker compose -p solodesk-backend-production pull api worker beat
          docker compose -p solodesk-backend-production up -d api worker beat

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue
