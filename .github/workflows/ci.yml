name: CI / CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # -------------------------------------------------------------------------
  # Unit tests — mocked repositories, no external services.
  # Runs on every PR to main and every push to main/develop.
  # -------------------------------------------------------------------------
  test-unit:
    name: Test / Unit
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install hatch
          pip install ".[dev]"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@localhost:5432/solodesk_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-min!!
          JWT_SECRET_KEY: ci-test-jwt-key-32-chars-minimum!
        run: pytest tests/unit -v

  # -------------------------------------------------------------------------
  # Integration tests — real PostgreSQL + Redis (rolled back per test).
  # Runs on every PR to main and every push to main/develop.
  # -------------------------------------------------------------------------
  test-integration:
    name: Test / Integration
    runs-on: ubuntu-latest
    container:
      image: python:3.13-slim
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solodesk
          POSTGRES_PASSWORD: solodesk
          POSTGRES_DB: solodesk_test
      redis:
        image: redis:7-alpine
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install hatch
          pip install ".[dev]"

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
          DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
          REDIS_URL: redis://redis:6379/0
          SECRET_KEY: ci-test-secret-key-32-chars-min!!
          JWT_SECRET_KEY: ci-test-jwt-key-32-chars-minimum!
        run: pytest tests/integration -v

  # -------------------------------------------------------------------------
  # Build + push images to GHCR.
  # Gated on tests passing.
  #   push -> develop : tag `staging`
  #   push -> main    : tag `latest`
  # Image names follow docker-compose convention (${IMAGE_NAME}, -worker, -beat)
  # so the deploy jobs can pull the exact same refs via compose.
  # -------------------------------------------------------------------------
  build-image:
    name: Build / Image
    runs-on: ubuntu-latest
    needs:
      - test-unit
      - test-integration
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name and tag
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG=latest
          else
            TAG=staging
          fi
          echo "IMAGE_NAME=ghcr.io/${REPO_LOWER}/solodesk-backend:${TAG}" >> "$GITHUB_ENV"

      - name: Build images
        run: docker compose build api worker beat

      - name: Push images
        run: |
          docker push "${IMAGE_NAME}"
          docker push "${IMAGE_NAME}-worker"
          docker push "${IMAGE_NAME}-beat"

  # -------------------------------------------------------------------------
  # Deploy to staging on push -> develop.
  # Runs on the staging self-hosted runner; secrets scoped via the
  # `staging` GitHub Environment.
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy / Staging
    runs-on: [self-hosted, staging]
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV: staging
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
      CELERY_RESULT_BACKEND: ${{ secrets.CELERY_RESULT_BACKEND }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      ZALO_OA_ACCESS_TOKEN: ${{ secrets.ZALO_OA_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          $env:IMAGE_NAME = "ghcr.io/$repoLower/solodesk-backend:staging"
          docker compose pull api worker beat
          docker compose up -d --no-build api worker beat

      - name: Cleanup
        shell: powershell
        run: docker image prune -f

  # -------------------------------------------------------------------------
  # Deploy to production on push -> main.
  # Runs on the production self-hosted runner; secrets scoped via the
  # `production` GitHub Environment.
  # -------------------------------------------------------------------------
  deploy-production:
    name: Deploy / Production
    runs-on: [self-hosted, production]
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      APP_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
      CELERY_RESULT_BACKEND: ${{ secrets.CELERY_RESULT_BACKEND }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      ZALO_OA_ACCESS_TOKEN: ${{ secrets.ZALO_OA_ACCESS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          $env:IMAGE_NAME = "ghcr.io/$repoLower/solodesk-backend:latest"
          docker compose pull api worker beat
          docker compose up -d --no-build api worker beat

      - name: Cleanup
        shell: powershell
        run: docker image prune -f
