# ===========================================================================
# SoloDesk — Local development stack
# ===========================================================================

services:

  # -------------------------------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: solodesk
      POSTGRES_PASSWORD: solodesk
      POSTGRES_DB: solodesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solodesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------------------------------
  # Migrate + seed (one-shot).
  # Runs alembic upgrade head then seeds default data.
  # api and worker wait for this to complete successfully.
  # Idempotent — safe to run on every `docker compose up`.
  # -------------------------------------------------------------------------
  migrate:
    build:
      context: .
      target: runtime
    restart: "no"
    environment:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    command: python scripts/bootstrap.py

  # -------------------------------------------------------------------------
  # FastAPI app
  # -------------------------------------------------------------------------
  api:
    image: ${IMAGE_NAME:-solodesk-backend:local}
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./contracts:/app/contracts:ro
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    command: >
      uvicorn src.main:app
        --host 0.0.0.0
        --port 8000
        --reload

  # -------------------------------------------------------------------------
  # Celery worker
  # -------------------------------------------------------------------------
  worker:
    image: ${IMAGE_NAME:-solodesk-backend:local}-worker
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./contracts:/app/contracts:ro

  # -------------------------------------------------------------------------
  # Celery beat (scheduler)
  # -------------------------------------------------------------------------
  beat:
    image: ${IMAGE_NAME:-solodesk-backend:local}-beat
    build:
      context: .
      target: beat
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    volumes:
      - ./src:/app/src
      - ./contracts:/app/contracts:ro

  # -------------------------------------------------------------------------
  # Mailpit — local SMTP / email UI
  # -------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # -------------------------------------------------------------------------
  # Test runner — uses dev image (includes pytest, httpx, etc.)
  # Usage: docker compose run --rm test
  # -------------------------------------------------------------------------
  test:
    build:
      context: .
      target: test
    restart: "no"
    environment:
      DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
      TEST_DATABASE_URL: postgresql+asyncpg://solodesk:solodesk@db:5432/solodesk_test
      APP_ENV: development
      SECRET_KEY: test-secret-key-not-for-production
      JWT_SECRET_KEY: test-jwt-secret-key-not-for-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./contracts:/app/contracts:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    command: python -m pytest tests/ -v

  # -------------------------------------------------------------------------
  # pgAdmin — local PostgreSQL web UI
  # http://localhost:5050  login: admin@solodesk.dev / admin
  # Add server: host=db, port=5432, db=solodesk, user/pass=solodesk
  # -------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@solodesk.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
